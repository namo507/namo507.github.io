name: Sync GitHub Showcase

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'
  push:
    branches:
      - master
    paths-ignore:
      - '_data/github.yml'

# Serialize with the other auto-committing workflows so two bots never push to
# master concurrently.
concurrency:
  group: repo-autocommit
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh generated GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/sync_github_showcase.py

      - name: Commit generated data if changed
        run: |
          if git diff --quiet -- _data/github.yml; then
            echo "No GitHub showcase changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/github.yml
          git commit -m "Automated GitHub showcase refresh"
          # Rebase-and-retry push so a concurrent bot push cannot reject this one.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:master; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing."
            git pull --rebase origin master || true
            sleep $((attempt * 3))
          done
          echo "::warning::Could not push GitHub showcase refresh after 5 attempts."