name: Sync GitHub Showcase

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'
  push:
    branches:
      - master
    paths-ignore:
      - '_data/github.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh generated GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/sync_github_showcase.py

      - name: Commit generated data if changed
        run: |
          if git diff --quiet -- _data/github.yml; then
            echo "No GitHub showcase changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/github.yml
          git commit -m "Automated GitHub showcase refresh"
          git push