name: Scrape Talk Locations

on:
  push:
    paths:
      - 'talks/**'
      - '_talks/**'
      - 'talkmap.ipynb'

# Serialize with the other auto-committing workflows so two bots never push to
# master concurrently.
concurrency:
  group: repo-autocommit
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # This workflow pushes to the repository

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install jupyter pandas requests beautifulsoup4 geopy  # Add other dependencies as needed
        pip install getorg --upgrade

    - name: Run Jupyter Notebook
      run: |
        jupyter nbconvert --to notebook --execute talkmap.ipynb --output talkmap_out.ipynb

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        git commit -m "Automated update of talk locations"
        # Rebase-and-retry push so a concurrent bot push cannot reject this one.
        for attempt in 1 2 3 4 5; do
          if git push origin HEAD:"${GITHUB_REF_NAME:-master}"; then
            exit 0
          fi
          echo "Push rejected (attempt $attempt); rebasing."
          git pull --rebase origin "${GITHUB_REF_NAME:-master}" || true
          sleep $((attempt * 3))
        done
        echo "::warning::Could not push talk-location update after 5 attempts."
